services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: url-shortener-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/app.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true          # Render auto-generates a secure secret
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: CACHE_TTL_SECONDS
        value: "3600"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: RATE_LIMIT_ANON_MAX
        value: "10"
      - key: RATE_LIMIT_FREE_MAX
        value: "50"
      - key: ANALYTICS_FLUSH_INTERVAL_MS
        value: "60000"
      - key: DATABASE_URL
        fromDatabase:
          name: url-shortener-db
          property: connectionString
      # REDIS_URL and CORS_ORIGIN added manually after deploy

  # ── Analytics Worker ────────────────────────────────────────────────────────
  - type: worker
    name: url-shortener-worker
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/workers/analyticsWorker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: url-shortener-db
          property: connectionString
      # REDIS_URL added manually after deploy

databases:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  - name: url-shortener-db
    databaseName: urlshortener
    user: dev
